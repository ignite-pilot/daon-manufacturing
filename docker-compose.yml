# 다온 제조 공정 관리 - 로컬 실행
# 단일 포트: http://localhost:8080 → nginx가 app:3500으로 프록시

services:
  app:
    build: .
    environment:
      - NODE_ENV=production
    # AWS 자격 증명: 호스트 ~/.aws 또는 env_file 전달

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    # 8080 → nginx → app:3500
